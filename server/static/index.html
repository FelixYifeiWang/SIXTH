<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ConnectQ</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

  <div class="header">
    <div class="header-title">ConnectQ</div>
    <div class="header-status">
      <div class="conn-indicator">
        <span>Server</span>
        <div class="conn-dot connected" id="conn-server"></div>
      </div>
    </div>
  </div>

  <div class="voice-page">
    <div class="card voice-card">
      <div class="card-label">Voice Input</div>
      <div class="voice-controls">
        <div class="mic-ring" id="ring">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm-1 17.93V21H9v2h6v-2h-2v-2.07A8 8 0 0 0 20 11h-2a6 6 0 0 1-12 0H4a8 8 0 0 0 7 7.93z"/>
          </svg>
          <div class="wave-bars">
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
          </div>
        </div>
        <button id="voice-btn" onclick="toggle()">Start Recording</button>
      </div>
      <div class="voice-result">
        <div class="voice-transcript" id="voice-transcript"></div>
        <span class="sentiment-pill" id="sentiment-pill" style="display:none"></span>
        <div class="emotion-detail" id="emotion-detail" style="display:none"></div>
      </div>
    </div>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
