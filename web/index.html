<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>ConnectQ</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="header">
    <div class="header-title">ConnectQ</div>
    <div class="header-status">
      <div class="conn-indicator">
        <span>Server</span>
        <div class="conn-dot" id="conn-server"></div>
      </div>
    </div>
  </div>

  <div class="main">
    <!-- Emotion Orb -->
    <div class="orb-section">
      <div class="orb-container">
        <canvas id="waveform" class="waveform-canvas"></canvas>
        <div class="orb-glow" id="orb-glow"></div>
        <div class="orb" id="orb">
          <div class="orb-inner"></div>
        </div>
      </div>
      <div class="emotion-label" id="emotion-label">Ready</div>
      <div class="emotion-sub" id="emotion-sub">Connecting...</div>
      <div class="trigger-banner" id="trigger-banner"></div>
    </div>

    <!-- Emotion Bars -->
    <div class="emotion-bars" id="emotion-bars">
      <div class="bar-row" id="bar-0">
        <span class="bar-name" id="bar-name-0">--</span>
        <div class="bar-track"><div class="bar-fill" id="bar-fill-0"></div></div>
        <span class="bar-pct" id="bar-pct-0">0%</span>
      </div>
      <div class="bar-row" id="bar-1">
        <span class="bar-name" id="bar-name-1">--</span>
        <div class="bar-track"><div class="bar-fill" id="bar-fill-1"></div></div>
        <span class="bar-pct" id="bar-pct-1">0%</span>
      </div>
      <div class="bar-row" id="bar-2">
        <span class="bar-name" id="bar-name-2">--</span>
        <div class="bar-track"><div class="bar-fill" id="bar-fill-2"></div></div>
        <span class="bar-pct" id="bar-pct-2">0%</span>
      </div>
    </div>

    <!-- Timeline -->
    <div class="timeline-section">
      <div class="timeline-label">Emotion Timeline</div>
      <canvas id="timeline"></canvas>
    </div>

  </div>

  <!-- Log Panel (top-left, folded by default) -->
  <div class="log-panel collapsed" id="log-panel">
    <button class="log-toggle" onclick="toggleLog()">
      <span class="log-toggle-icon" id="log-toggle-icon">&#9638;</span>
      <span>Log</span>
    </button>
    <div class="log-body" id="log-body">
      <div class="log-list" id="log-list"></div>
    </div>
  </div>

  <!-- Trigger Panel (top-right, folded by default) -->
  <div class="trigger-panel collapsed" id="trigger-panel">
    <button class="trigger-toggle" id="trigger-toggle" onclick="togglePanel()">
      <span class="trigger-toggle-icon" id="trigger-toggle-icon">&#9776;</span>
      <span class="trigger-toggle-label">Triggers</span>
    </button>
    <div class="trigger-body" id="trigger-body">
      <div class="trigger-grid" id="trigger-grid"></div>
    </div>
  </div>

  <script>
    window.CONNECTQ_API_URL = "https://connectq-production.up.railway.app";
  </script>
  <script src="js/app.js"></script>
</body>
</html>
